# Kitty config — mirrored from .wezterm.lua
# ============================================

# Font
font_family      FiraCode Nerd Font Mono
font_size        12
background       #000000
cursor           #6cb6eb
cursor_text_color white
selection_background #6cb6eb
selection_foreground white
copy_on_select yes
scrollback_lines 10000
window_padding_width 0
confirm_os_window_close 0
tab_bar_style hidden

# Keybindings
clear_all_shortcuts yes
map ctrl+r        set_tab_title
map alt+v         paste_from_clipboard
map alt+c         copy_to_clipboard
map ctrl+f        show_scrollback
map ctrl+t        new_tab_with_cwd
map ctrl+q        close_tab
map ctrl+n        scroll_page_down
map ctrl+e        scroll_page_up
map ctrl+v        copy_mode
map ctrl+super+f  toggle_fullscreen
map ctrl+tab      next_tab
map ctrl+shift+tab previous_tab
