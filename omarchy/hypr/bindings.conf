$browser  = brave
$slack    = hyprctl clients | grep -qi slack && hyprctl dispatch focuswindow class:slack || slack
$btop     = hyprctl clients | grep -qi btop && hyprctl dispatch focuswindow class:btop || kitty --class btop -e btop
$term     = hyprctl clients | grep -qi kitty && hyprctl dispatch focuswindow class:kitty || kitty --title " Term"
$editor   = neovide
$app      = uwsm-app
$script   = ~/.config/dotfiles/omarchy/scripts
$osdclient = omarchy-swayosd-client

# unbind
unbind = SUPER, W
unbind = SUPER, R
unbind = SUPER, F
unbind = SUPER, TAB
unbind = ALT, TAB
unbind = ALT, P
unbind = CONTROL SUPER, N
unbind = CONTROL SUPER, E
unbind = CONTROL SUPER, I
unbind = SUPER, T
unbind = SUPER, SPACE
unbind = SUPER, L

# App bindings
bindd = ALT, RETURN,          Terminal,        exec, $term
bindd = ALT, B,               Browser,         exec, $browser
bindd = ALT, S,               Browser,         exec, $slack
bindd = ALT, A,               Editor,          exec, $editor
bindd = SUPER, T,             Btop,            exec, $btop

# Window controls
bindd = ALT, F,               Full width,      fullscreen, 1
bindd = SUPER , F,            Full screen,     fullscreen, 0
bindd = ALT, T,               Toggle floating, togglefloating,

bind = ALT, Q,                killactive
bind = ALT, O,                cyclenext, tiled
bind = ALT, Tab,              cyclenext, tiled
bind = ALT, N,                movefocus, d
bind = ALT, E,                movefocus, u
bind = ALT, H,                movefocus, l
bind = ALT, I,                movefocus, r
bind = ALT SHIFT, N,          swapwindow, d
bind = ALT SHIFT, E,          swapwindow, u
bind = ALT SHIFT, H,          swapwindow, l
bind = ALT SHIFT, I,          swapwindow, r

# Workspace controls
bind = SUPER, N,              workspace, 1
bind = SUPER, E,              workspace, 2
bind = SUPER, I,              workspace, 3
bind = SUPER, O,              workspace, 4
bind = SUPER, H,              workspace, 5

bind = CONTROL SUPER, N,      movetoworkspace, 1
bind = CONTROL SUPER, E,      movetoworkspace, 2
bind = CONTROL SUPER, I,      movetoworkspace, 3
bind = CONTROL SUPER, O,      movetoworkspace, 4
bind = CONTROL SUPER, H,      movetoworkspace, 5

# Scripts
bindd = ALT,   K,               Events,          exec, $script/khal-view.js
bindd = ALT,   M,               Open notify,     exec, $script/click-notification.js
bindd = ALT,   semicolon,       Hubstaff toggle, exec, $script/hubstaff-toggle.js
bindd = SUPER, SPACE,           Change method,   exec, $script/fcit5-custom.js

# Picker
bindd = SUPER, A,               Audio picker,    exec, omarchy-launch-audio
bindd = SUPER, R,               Audio picker,    exec, omarchy-launch-bluetooth
bindd = SUPER, S,               Audio picker,    exec, omarchy-launch-wifi

# Misc
bindd = ALT,   ESCAPE,          Application,     exec, omarchy-launch-walker
bindd = SUPER, L,               Suspend,         exec, hubstaff stop; omarchy-system-lock
bindd = CONTROL SUPER, Q,       Quit hyprland,   exec, omarchy-system-logout
bindd = SUPER SHIFT, R,         Reload config,   exec, hyprctl reload; makoctl reload; killall waybar; waybar
bindd = SUPER, P,               Screenshot,      exec, omarchy-capture-screenshot
bindd = SUPER, S,               Screenrecord,    exec, omarchy-menu-screenrecord

# Media
bindeld = SUPER, Z,           Volume down,       exec, $osdclient --output-volume lower
bindeld = SUPER, X,           Volume up,         exec, $osdclient --output-volume raise
bindeld = SUPER, C,           Mute,              exec, $osdclient --output-volume mute-toggle
bindeld = SUPER, V,           Mute microphone,   exec, $osdclient --input-volume mute-toggle
bindeld = SUPER, B,           Next audio output, exec, omarchy-audio-output-switch

# Brightness
bindeld = SUPER, Q,           Brightness down, exec, omarchy-brightness-display 5%-
bindeld = SUPER, W,           Brightness up,   exec, omarchy-brightness-display +5%
