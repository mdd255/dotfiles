# Load secret environment variables into Hyprland for GUI apps (e.g. Neovide)
exec-once = bash -c 'source /home/dh/.config/secret-env && grep "^export " /home/dh/.config/secret-env | sed "s/^export //" | while IFS= read -r line; do key="${line%%=*}"; eval "val=\$$key"; hyprctl keyword env "$key,$val"; done'

# Extra autostart processes
exec-once = /home/dh/Hubstaff/HubstaffClient.bin.x86_64 --no-watchdog
exec-once = slack
exec-once = brave
